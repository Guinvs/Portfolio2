
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfólio - Guilherme</title>

  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Open Sans', sans-serif;
      color: #000;
      overflow-x: hidden;
    }

    /* ===================== */
    /* FUNDO ANIMADO */
    /* ===================== */

    .gradient-background {
      background: linear-gradient(90deg, #5de0e6, #004aad, #5de0e6);
      background-size: 200% 100%;
      animation: gradientFlow 6s linear infinite;
    }

    @keyframes gradientFlow {
      0% { background-position: 0 0; }
      100% { background-position: -100% 0; }
    }

    /* ===================== */
    /* SEÇÕES */
    /* ===================== */

    section {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 56px;
      margin-bottom: 20px;
    }

    h2 {
      font-size: 36px;
      margin: 20px 0;
    }

    p {
      font-size: 20px;
      line-height: 1.6;
      max-width: 700px;
    }

    /* ===================== */
    /* INTRO */
    /* ===================== */

    .intro-icons {
      position: absolute;
      top: 0px;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0px;
    }

    .intro-icons img {
      width: 250px;
      
    }

    /* ===================== */
    /* BIO */
    /* ===================== */

    .profile-img {
      width: 280px;
      height: 280px;
      border-radius: 10%;
      margin-top: 20px;
      box-shadow: 0 0 0 3px #004aad;
    }

   .bio-icons {
  position: relative;
  width: 100%;
  max-width: 1200px;
  height: 200px;
}

.bio-icons img {
  position: absolute;
  width: 120px;
}

.PC-left {
  display: flex;
  justify-content: flex-start;
  align-items: start;
  width: 100%;
  right: 0;
  margin-top: 60px;

}
.PC-left img {
  width: 180px;
}

.PS-center {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100%;
  right: 0;
  margin-top: 60px;

}
 .PS-center img {
  width: 180px;
}

    .bio-icons-coffee {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      width: 100%;
      right: 0;
      margin-top: 10px;

    }

.bio-icons-coffee img {
  width: 180px;
}

 

    /* ===================== */
    /* SKILLS */
    /* ===================== */

    .skills{
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    }

    .millos-right {
      position: absolute;
      right: 0;
      margin-bottom: 300px;

    }

    .millos-right img {
      width: 180px;
      height: 200px;
      border-radius: 10% ;
    }

     .ninja-left {
     position: absolute;
     left:0;
     margin-bottom:300px;
     height: 200px;
    }

    .ninja-left img {
      width: 180px;
    }

    /* ===================== */
    /* PLAY */
    /* ===================== */

    .play{
      margin-bottom: 45px;
    }

    .play img {
      width: 100px;
      margin-bottom: 20px;
    }
    /* Footer */

    .footer-nav {
  display: flex;
  justify-content: center;
  gap: 40px; /* espaçamento entre botões */
}

.footer-nav button {
  background-color: #5de0e6;
  color: #000;
  border: none;
  padding: 12px 24px;
  font-size: 16px;
  font-weight: 600;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.3s ease;
}

.footer-nav button:hover {
  background-color: #004aad;
  color: #fff;
  transform: scale(1.05);
}

  </style>
</head>
